<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <nav><a href="index.html">Home</a></nav>
    </header>

    <main id="place-details" class="place-details">
        <section id="place-info" class="place-info">
            </section>

        <section id="reviews">
            <h3>Reviews</h3>
            <div id="reviews-container"></div>
        </section>

        <section id="add-review" style="display:none;">
            <a href="add_review.html" id="add-review-button" class="details-button">Add Review</a>
        </section>
    </main>

    <footer><p>All rights reserved © 2026</p></footer>
    <script src="scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const placeId = params.get('id');
            if (placeId) fetchPlaceDetails(placeId);
        });
    </script>
</body>
</html>
