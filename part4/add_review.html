<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" class="logo">
    </header>

    <main>
        <form id="review-form" class="form add-review">
            <h2>Add a Review</h2>
            <textarea id="review-text" placeholder="Your comment..." required></textarea>
            <select id="review-rating">
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
                <option value="3">3 Stars</option>
                <option value="2">2 Stars</option>
                <option value="1">1 Star</option>
            </select>
            <button type="submit" class="details-button">Submit Review</button>
        </form>
    </main>

    <footer><p>All rights reserved © 2026</p></footer>
    <script src="scripts.js"></script>
</body>
</html>
